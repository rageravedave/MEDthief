services:
  - type: web
    name: medthief
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run web_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
